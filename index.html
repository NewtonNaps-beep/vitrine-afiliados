<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Vitrine de Afiliados</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="https://via.placeholder.com/100" alt="Logo da Loja" class="logo">
            <h1>Minha Loja de Achadinhos</h1>
            <p class="subtitle">Achadinhos, ofertas e produtos selecionados</p>
        </header>

        <div class="search-container">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Pesquisar por código ou nome do item">
            </div>
        </div>

        <main id="productList">
            <!-- Cards serão inseridos via JavaScript -->
        </main>
    </div>

    <script type="module" src="scripts.js"></script>
</body>
</html>
