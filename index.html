<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine de Afiliado Brabos</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <img src="https://cf.shopee.com.br/file/br-11134207-7qukw-ljm1z6z0x1z1e9" alt="Logo" class="logo" style="border-radius: 50%;">
            <h1>Vitrine de Afiliado <span style="color: #ee4d2d;">Brabos</span></h1>
            <p class="subtitle">As melhores ofertas e achadinhos selecionados para você!</p>
        </header>

        <div class="search-container">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Pesquisar por código ou nome do item">
            </div>
        </div>

        <main id="productList">
            <!-- Cards serão inseridos via JavaScript -->
        </main>
    </div>

    <script type="module" src="scripts.js"></script>

</html>
