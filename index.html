<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Vitrine de Afiliados | Ofertas</title>
    <meta name="description" content="Encontre as melhores ofertas e produtos dos maiores marketplaces do Brasil: Shopee, Mercado Livre e Amazon.">
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS (xlsx) para leitura das planilhas Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="banner-container">
                <img src="banner.png" alt="Banner Vitrine de Afiliados" class="banner-img">
            </div>
            <div class="profile-container">
                <img src="perfil.png" alt="Perfil" class="profile-img-real">
            </div>
            <h1>Vitrine de Afiliados</h1>
            <p class="subtitle">As melhores ofertas da internet selecionadas para você.</p>
        </header>

        <main class="links-list" id="links-container">
            <!-- Loading indicator -->
            <div id="loading" style="text-align: center; width: 100%; padding: 20px;">
                <i data-lucide="loader" style="animation: spin 2s linear infinite;"></i>
                <p style="margin-top: 10px;">Carregando ofertas...</p>
                <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Vitrine de Afiliados. Todos os direitos reservados.</p>
        </footer>
    </div>

    <!-- Inicializa os ícones do Lucide no HTML base -->
    <script>lucide.createIcons();</script>
    <!-- Script principal para carregar as planilhas -->
    <script src="scripts.js"></script>
</body>
</html>
