<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine de Afiliado Brabos</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-container">
                <img src="https://picsum.photos/200/200?random=11" alt="Logo" class="logo">
            </div>
            <h1>Vitrine de Afiliado <span class="highlight">Brabos</span></h1>
            <p class="subtitle">As melhores ofertas e achadinhos selecionados para você!</p>
        </header>

        <div class="search-container">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Pesquisar por código, nome ou descrição">
            </div>
        </div>

        <main id="productList">
            <!-- Cards serão inseridos via JavaScript -->
        </main>
        
        <footer>
            <p>&copy; 2026 Vitrine de Afiliado Brabos. Todos os direitos reservados.</p>
            <div class="social-links">
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-tiktok"></i></a>
                <a href="#"><i class="fa-brands fa-youtube"></i></a>
            </div>
        </footer>
    </div>

    <script type="module" src="scripts.js"></script>
</body>
</html>
